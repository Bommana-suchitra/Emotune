{% extends "allauth/layouts/base.html" %}
{% load i18n %}

{% block body %}
<style>
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #f4f6f9;
    margin: 0;
  }

  .entrance-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .entrance-container {
    width: 100%;
    max-width: 420px;
  }

  .message {
    background: #fee2e2;
    color: #b91c1c;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    border: 1px solid #fecaca;
    font-size: 14px;
  }
</style>

<div class="entrance-wrapper">
  <div class="entrance-container">

    {% if messages %}
      {% for message in messages %}
        <div class="message">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock content %}

  </div>
</div>
{% endblock body %}
