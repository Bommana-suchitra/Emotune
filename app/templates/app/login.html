<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisoSound — Login</title>

  {% load socialaccount %}

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1e40af;
      --text: #111827;
      --muted: #6b7280;
      --error: #dc2626;
      --success: #16a34a;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);

      /* ✅ FIXED SCROLL ISSUE */
      min-height: 100vh;
      padding: 20px;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow-y: auto;
    }

    .card {
      background: var(--card);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);

      /* ✅ scroll inside card if needed */
      max-height: 90vh;
      overflow-y: auto;
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
      font-size: 22px;
      color: var(--primary);
      display: inline-block;
      padding: 0 20px;
      letter-spacing: 0.08em;
      transform: scaleX(1.15);
      transform-origin: center;
    }

    h1 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 25px;
    }

    .messages {
      margin-bottom: 15px;
    }

    .msg {
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .msg.error {
      background: #fee2e2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .msg.success {
      background: #dcfce7;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    input.error {
      border-color: var(--error);
      background-color: #fef2f2;
    }

    input.error:focus {
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.15);
    }

    .field-error {
      font-size: 12px;
      color: var(--error);
      margin-top: 4px;
      display: none;
    }

    .field-error.show {
      display: block;
    }

    .forgot-link {
      text-align: right;
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 15px;
      text-decoration: none;
    }

    .forgot-link:hover {
      color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 12px;
      color: var(--muted);
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      width: 40%;
      height: 1px;
      background: var(--border);
      top: 50%;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .google-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      text-decoration: none;
      color: #202124;
      font-size: 14px;
      background: #fff;
      margin-bottom: 15px;
      box-shadow: inset 0 0 0 0 rgba(0,0,0,0.12);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .google-btn:hover {
      background: #f7f7f7;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    .google-icon {
      display: inline-flex;
      width: 18px;
      height: 18px;
      align-items: center;
      justify-content: center;
    }

    .google-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .alt-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    

    .alt-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .alt-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">VisoSound</div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Login to your account</p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="msg {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST" onsubmit="return validateForm()">
      {% csrf_token %}

      <div class="field">
        <label for="username">Username</label>
        <input 
          type="text" 
          name="username" 
          id="username" 
          required 
          autocomplete="username"
          placeholder="Enter your username"
        />
        <div class="field-error" id="username-error"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input 
          type="password" 
          name="password" 
          id="password" 
          required 
          autocomplete="current-password"
          placeholder="Enter your password"
        />
        <div class="field-error" id="password-error"></div>
      </div>

      <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot password?</a>

      <button type="submit" class="btn">Login</button>
    </form>

    <div class="divider">or</div>

    <form id="google-form" method="get" style="display:none;">
      {% csrf_token %}
    </form>

    <button type="button" class="google-btn" onclick="handleGoogleLogin()">
      <span class="google-icon" aria-hidden="true">
        <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M9 7.5v3h4.35c-.2 1.15-.95 2.1-2.025 2.75l3.275 2.55C15.85 13.65 17 10.95 17 9c0-.65-.05-1.3-.15-1.95H9Z"/>
          <path fill="#34A853" d="M4.275 10.35 2.6 12.9C1.45 11.45 1 9.75 1 8c0-1.1.2-2.15.55-3.1L4.3 7.1c-.1.65-.15 1.35-.15 2.05 0 .7.05 1.4.125 2.15Z"/>
          <path fill="#FBBC05" d="M9 17c2.425 0 4.45-.8 5.925-2.175l-3.275-2.55c-.9.6-2.05.95-3.4.95-2.6 0-4.8-1.75-5.575-4.1L1.05 11.1C2.55 14.65 5.55 17 9 17Z"/>
          <path fill="#4285F4" d="M16.85 5.35 13.575 7.9C12.675 7.25 11.575 6.9 10.35 6.9c-1.725 0-3.2 1.125-3.725 2.65L1.05 5.1C2.55 2.55 5.55 0.5 9 0.5c2.55 0 4.85.95 6.7 2.55l1.15 1.7Z"/>
        </svg>
      </span>
      Continue with Google
    </button>

    <div class="alt-link">
      New here? <a href="{% url 'register' %}">Create account</a>
    </div>
  </div>

  <script>
    // Store Google OAuth URL in data attribute (not visible in href)
    const googleAuthUrl = "{% provider_login_url 'google' %}";

    function handleGoogleLogin() {
      // Redirect to Google OAuth without exposing in href
      window.location.href = googleAuthUrl;
    }

    // Clear errors when user starts typing
    document.getElementById('username').addEventListener('input', function() {
      clearError('username');
    });

    document.getElementById('password').addEventListener('input', function() {
      clearError('password');
    });

    function clearError(fieldName) {
      const field = document.getElementById(fieldName);
      const errorDiv = document.getElementById(fieldName + '-error');
      if (field && errorDiv) {
        field.classList.remove('error');
        errorDiv.classList.remove('show');
        errorDiv.textContent = '';
      }
    }

    function showError(fieldName, message) {
      const field = document.getElementById(fieldName);
      const errorDiv = document.getElementById(fieldName + '-error');
      if (field && errorDiv) {
        field.classList.add('error');
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
        field.focus();
        return false;
      }
      return true;
    }

    function validateForm() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      let isValid = true;

      // Clear previous errors
      clearError('username');
      clearError('password');

      // Validate username
      if (!username) {
        showError('username', 'Username is required');
        isValid = false;
      } else if (username.length < 3) {
        showError('username', 'Username must be at least 3 characters');
        isValid = false;
      } else if (!/^[a-zA-Z0-9_@.+-]+$/.test(username)) {
        showError('username', 'Username contains invalid characters');
        isValid = false;
      }

      // Validate password
      if (!password) {
        showError('password', 'Password is required');
        isValid = false;
      } else if (password.length < 1) {
        showError('password', 'Password cannot be empty');
        isValid = false;
      }

      return isValid;
    }

    // Prevent form submission on Enter key if validation fails
    document.querySelector('form').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.onsubmit && !this.onsubmit()) {
        e.preventDefault();
      }
    });
  </script>

</body>
</html>
