<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisoSound — Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  {% load socialaccount %}

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #111827;
      --muted: #6b7280;
      --error: #dc2626;
      --success: #16a34a;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      border-radius: 8px;
      font-size: 18px;
    }

    .logo-name {
      font-weight: 700;
      font-size: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 25px;
    }

    .messages { margin-bottom: 15px; }

    .msg {
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .msg.error {
      background: #fee2e2;
      color: var(--error);
    }

    .msg.success {
      background: #dcfce7;
      color: var(--success);
    }

    .field { margin-bottom: 16px; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .strength-bar {
      height: 4px;
      background: #e5e7eb;
      margin-top: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .google-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      text-decoration: none;
      color: #202124;
      font-size: 14px;
      background: #fff;
      margin-top: 10px;
      box-shadow: inset 0 0 0 0 rgba(0,0,0,0.12);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .google-btn:hover {
      background: #f7f7f7;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    .google-icon {
      display: inline-flex;
      width: 18px;
      height: 18px;
      align-items: center;
      justify-content: center;
    }

    .google-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 13px;
      color: var(--muted);
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      height: 1px;
      width: 40%;
      background: var(--border);
      top: 50%;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .alt-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: var(--muted);
    }

    .alt-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .alt-link a:hover {
      text-decoration: underline;
    }

    .terms {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      color: var(--muted);
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎵</div>
    <span class="logo-name">VisoSound</span>
  </div>

  <h1>Create account</h1>
  <p class="subtitle">Your emotion. Your music.</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="msg {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="field">
      <label>Username</label>
      <input type="text" name="username" required>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="field">
      <label>Preferred Music Language</label>
      <select name="language">
        {% for lang in languages %}
        <option value="{{ lang }}">{{ lang }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="row">
      <div class="field">
        <label>Password</label>
        <input type="password" id="password1" name="password1" required>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="password2" required>
      </div>
    </div>

    <button type="submit" class="btn">Create Account</button>

    <p class="terms">By signing up, you agree to our Terms & Privacy Policy.</p>
  </form>

  <div class="divider">or</div>

  <button type="button" class="google-btn" onclick="handleGoogleLogin()">
    <span class="google-icon" aria-hidden="true">
      <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M9 7.5v3h4.35c-.2 1.15-.95 2.1-2.025 2.75l3.275 2.55C15.85 13.65 17 10.95 17 9c0-.65-.05-1.3-.15-1.95H9Z"/>
        <path fill="#34A853" d="M4.275 10.35 2.6 12.9C1.45 11.45 1 9.75 1 8c0-1.1.2-2.15.55-3.1L4.3 7.1c-.1.65-.15 1.35-.15 2.05 0 .7.05 1.4.125 2.15Z"/>
        <path fill="#FBBC05" d="M9 17c2.425 0 4.45-.8 5.925-2.175l-3.275-2.55c-.9.6-2.05.95-3.4.95-2.6 0-4.8-1.75-5.575-4.1L1.05 11.1C2.55 14.65 5.55 17 9 17Z"/>
        <path fill="#4285F4" d="M16.85 5.35 13.575 7.9C12.675 7.25 11.575 6.9 10.35 6.9c-1.725 0-3.2 1.125-3.725 2.65L1.05 5.1C2.55 2.55 5.55 0.5 9 0.5c2.55 0 4.85.95 6.7 2.55l1.15 1.7Z"/>
      </svg>
    </span>
    Continue with Google
  </button>

  <div class="alt-link">
    Already have an account? <a href="{% url 'login' %}">Sign in</a>
  </div>
</div>

<script>
// Store Google OAuth URL (from socialaccount/login.html template)
const googleAuthUrl = "{% provider_login_url 'google' %}";

function handleGoogleLogin() {
  // Redirect to Google OAuth via socialaccount/login.html
  window.location.href = googleAuthUrl;
}

// Password strength indicator
const p1 = document.getElementById('password1');
const fill = document.getElementById('strengthFill');

p1.addEventListener('input', () => {
  const v = p1.value;
  let score = 0;

  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;

  fill.style.width = (score * 25) + '%';

  const colors = ['#dc2626','#f59e0b','#10b981','#16a34a'];
  fill.style.background = colors[score - 1] || 'transparent';
});
</script>

</body>
</html>
