<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisioSound — Forgot Password</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1e40af;
      --text: #111827;
      --muted: #6b7280;
      --error: #dc2626;
      --success: #16a34a;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);

      /* ✅ Scroll fix */
      min-height: 100vh;
      padding: 20px;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow-y: auto;
    }

    .card {
      background: var(--card);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);

      max-height: 90vh;
      overflow-y: auto;
    }

    .icon {
      font-size: 28px;
      text-align: center;
      margin-bottom: 15px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .messages {
      margin-bottom: 15px;
    }

    .msg {
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .msg.error {
      background: #fee2e2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .msg.success {
      background: #dcfce7;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .back-link {
      text-align: center;
      display: block;
      margin-top: 15px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--primary);
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">🔑</div>

    <h1>Forgot Password?</h1>
    <p class="subtitle">
      Enter your registered email and we’ll send you a reset link.
    </p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="msg {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST" onsubmit="return validateEmail()">
      {% csrf_token %}

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>

      <button class="btn">Send Reset Link</button>
    </form>

    <a href="{% url 'auth' %}" class="back-link">← Back to Login</a>
  </div>

  <script>
    function validateEmail() {
      const email = document.getElementById("email").value.trim();

      if (!email.includes("@") || email.length < 5) {
        alert("Please enter a valid email address");
        return false;
      }

      return true;
    }
  </script>

</body>
</html>
